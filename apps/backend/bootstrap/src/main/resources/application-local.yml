spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/moeum
    username: moeum
    password: moeum
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 10000
      pool-name: Moeum-HikariPool

moeum:
  jwt:
    # 로컬 개발 전용 시크릿. 운영 환경에서는 환경변수/시크릿 매니저로 주입한다.
    secret: local-dev-only-jwt-secret-key-must-be-32-bytes-min
    expiration-seconds: 3600
